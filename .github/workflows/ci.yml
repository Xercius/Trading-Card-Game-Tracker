name: CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          # keeps SDK in sync with your repo
          global-json-file: ./global.json
      - name: Restore
        run: dotnet restore
      - name: .NET vulnerability scan
        run: dotnet list api.sln package --vulnerable --include-transitive
      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror
      - name: dotnet format check
        run: dotnet format api.sln --verify-no-changes --verbosity minimal
      - name: Set test environment
        run: echo "ASPNETCORE_ENVIRONMENT=Testing" >> $GITHUB_ENV
      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=tests.trx"
      - name: Upload .NET test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-tests
          path: api/TestResults/**/*.trx

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-vite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-vite/package-lock.json
      - name: Install
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - name: Lint (strict)
        run: npm run lint:strict
      - name: Type check
        run: npm run typecheck
      - name: Format check
        run: npm run format
      - name: Test (Vitest)
        run: npm run test:coverage
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client-vite/coverage/
      - name: Build
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook
